server:
  port: 8082

spring:
  config:
    import: optional:file:.env[.properties]
  ai:
    # LangFuse Agent数据观测
    observation:
      langfuse:
        # LangFuse 服务地址
        endpoint: ${LANGFUSE_ADDR}
        # 私钥
        secret-key: ${LANGFUSE_SECRET_KEY}
        # 公钥
        public-key: ${LANGFUSE_PUBLIC_KEY}
        # 采样率（生产环境建议0.1-0.5）
        sampling-rate: 1.0

# A2A协议服务端
agentscope:
  a2a:
    server:
      enabled: true
    nacos:
      server-addr: localhost:8848


agent:
  model_name: qwen3.7-max
  alibaba_dashscope_key: sk-255506ca196b48f38e686b3e82efac58

mcp:
  baidu_map_addr: https://mcp.map.baidu.com/sse?ak=uL9isweCUF63UYjNAqI2z2JyCX1N9x5I